<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Banner</title>

    <style>
        #welcomeBanner {
            background-color: blue;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .highlight {
            background-color: yellow;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="welcomeBanner">
        <h1>Welcome, Resident!</h1>

        <p>
            Register today and receive
            <span style="color: red; font-weight: bold;">
                20% OFF on selected workshops!
            </span>
        </p>

        <p class="highlight">
            Early registration closes soon.
        </p>

        <p class="highlight">
            Limited seats available.
        </p>
    </div>

</body>
</html>
