<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Event Gallery</title>

    <style>
        .event-image {
            border: 2px solid black;
            width: 200px;
            height: 150px;
        }

        table {
            border-collapse: collapse;
            margin: auto;
        }

        td {
            padding: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h2>Past Community Events</h2>

    <table>
        <tr>
            <td>
                <img src="images/event1.jpg"
                     alt="Music Festival"
                     title="Music Festival"
                     class="event-image">

                <p>Music Festival 2025</p>
            </td>

            <td>
                <img src="images/event2.jpg"
                     alt="Food Fair"
                     title="Food Fair"
                     class="event-image">

                <p>Food Fair 2025</p>
            </td>

            <td>
                <img src="images/event3.jpg"
                     alt="Art Exhibition"
                     title="Art Exhibition"
                     class="event-image">

                <p>Art Exhibition 2025</p>
            </td>
        </tr>

        <tr>
            <td>
                <img src="images/event4.jpg"
                     alt="Sports Day"
                     title="Sports Day"
                     class="event-image">

                <p>Sports Day 2025</p>
            </td>

            <td>
                <img src="images/event5.jpg"
                     alt="Book Fair"
                     title="Book Fair"
                     class="event-image">

                <p>Book Fair 2025</p>
            </td>

            <td>
                <img src="images/event6.jpg"
                     alt="Baking Workshop"
                     title="Baking Workshop"
                     class="event-image">

                <p>Baking Workshop 2025</p>
            </td>
        </tr>
    </table>

</body>
</html>
